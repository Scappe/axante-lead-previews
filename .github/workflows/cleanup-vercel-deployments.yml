name: Cleanup Vercel deployments

on:
  push:
    branches:
      - main
    paths:
      - "cleanup/requests/*.json"
  workflow_dispatch:
    inputs:
      confirmation:
        description: "Type DELETE_OLD_DEPLOYMENTS"
        required: true
        type: string
      dry_run:
        description: "Only show what would be deleted"
        required: true
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: axante-lead-previews-production
  cancel-in-progress: false

jobs:
  cleanup:
    name: Preserve current production only
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_TEAM_ID: team_J3lt5J14KCsR8INKAGHWAI09
      VERCEL_PROJECT_ID: prj_TJBwrXmx5R7TDUTKAO7CqX8f148K
      VERCEL_PRODUCTION_DOMAIN: axante-lead-previews.vercel.app
      DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || false }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Validate cleanup authorization
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${VERCEL_TOKEN}" ]]; then
            echo "Missing repository secret VERCEL_TOKEN"
            exit 1
          fi

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            if [[ "${{ inputs.confirmation }}" != "DELETE_OLD_DEPLOYMENTS" ]]; then
              echo "Invalid confirmation phrase"
              exit 1
            fi
            exit 0
          fi

          REQUEST_FILE="$(git diff-tree --no-commit-id --name-only -r "${GITHUB_SHA}" | grep -E '^cleanup/requests/[^/]+\.json$' | tail -n 1 || true)"
          if [[ -z "${REQUEST_FILE}" ]]; then
            echo "No cleanup request found"
            exit 1
          fi

          node - "${REQUEST_FILE}" <<'NODE'
          const fs = require('node:fs');
          const file = process.argv[2];
          const request = JSON.parse(fs.readFileSync(file, 'utf8'));
          const valid =
            request.action === 'delete_old_vercel_deployments' &&
            request.approved === true &&
            request.keep_current_production === true;

          if (!valid) {
            console.error(`Invalid cleanup request: ${file}`);
            process.exit(1);
          }
          NODE

      - name: Delete everything except current production
        shell: bash
        run: node scripts/vercel-deployment-cleanup.mjs
